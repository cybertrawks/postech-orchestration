apiVersion: v1
kind: ConfigMap
metadata:
  name: users-api-config
  namespace: gamestore
data:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Production"
  JwtSettings__Issuer: "Postech.API"
  JwtSettings__Audience: "Postech.Client"
  JwtSettings__ExpirationMinutes: "60"
  RabbitMQ__Host: "rabbitmq.infrastructure.svc.cluster.local"
  RabbitMQ__Port: "5672"
  RabbitMQ__Username: "fcg"
  RabbitMQ__VirtualHost: "/"
