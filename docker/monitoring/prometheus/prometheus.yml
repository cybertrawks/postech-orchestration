global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "users-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["postech-users-api:8080"]
        labels:
          service: "users-api"

  - job_name: "catalog-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["postech-catalog-api:8080"]
        labels:
          service: "catalog-api"
